<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoPlay - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #050505;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .icon {
      width: 64px; height: 64px;
      background: rgba(16,185,129,0.15);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #10b981; color: #fff; border: none;
      padding: 12px 32px; border-radius: 12px; font-size: 0.9rem;
      cursor: pointer; font-weight: 600;
    }
    button:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#127922;</div>
    <h1>You're Offline</h1>
    <p>CryptoPlay requires an internet connection to play games and manage your wallet. Please check your connection and try again.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
